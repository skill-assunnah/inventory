<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Admin</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>Inventory Admin</h1>
        <p class="muted">Only approved Gmail accounts can add, edit, and delete data</p>
      </div>
      <a class="admin-link" href="index.html">Home</a>
    </header>

    <section class="card">
      <div id="signinBox">
        <div id="g_id_onload"
             data-client_id="595288870162-9osli3vdb4vvgk3uaf2ij1465s595g2g.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard"></div>
      </div>
      <div id="adminStatus" class="muted"></div>
    </section>

    <section class="card hidden" id="adminPanel">
      <div class="admin-head">
        <h2 id="formTitle">Add Inventory Item</h2>
        <button type="button" class="secondary-btn hidden" id="cancelEditBtn">Cancel Edit</button>
      </div>

      <form id="itemForm" class="form-grid">
        <input type="hidden" name="id" />

        <select name="category" required>
          <option value="">Select category</option>
          <option>Lab Tools</option>
          <option>Lab Equipment</option>
          <option>Safety Equipment</option>
          <option>Furniture Items</option>
          <option>Consumable Items</option>
        </select>

        <input name="item_name" placeholder="Item name" required />
        <input name="model_or_specification" placeholder="Model / Specification" />
        <input name="manufacturer" placeholder="Manufacturer" />
        <input name="brand" placeholder="Brand" />
        <input name="purpose" placeholder="Purpose" />
        <input name="quality" placeholder="Quality" />
        <input name="quantity" type="number" placeholder="Quantity" />
        <input name="price" type="number" step="0.01" placeholder="Price" />
        <input name="grand_total" type="number" step="0.01" placeholder="Grand total" />
        <input name="deadline" placeholder="Deadline" />
        <input name="one_month_quantity" type="number" placeholder="1 month quantity" />
        <input name="three_month_quantity" type="number" placeholder="3 month quantity" />
        <input name="source_sheet" placeholder="Source sheet / category" />

        <textarea name="remarks" placeholder="Remarks"></textarea>
        <textarea name="comments" placeholder="Comments"></textarea>

        <div class="form-actions">
          <button type="submit" id="submitBtn">Add Item</button>
        </div>
      </form>

      <p id="formMessage" class="muted"></p>
    </section>

    <section class="card hidden" id="adminListPanel">
      <div class="admin-head">
        <h2>Current Inventory</h2>
        <button type="button" class="secondary-btn" id="reloadAdminListBtn">Reload</button>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Category</th>
              <th>Item</th>
              <th>Brand</th>
              <th>Qty</th>
              <th>Price</th>
              <th>Grand Total</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <tr><td colspan="8" class="center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
